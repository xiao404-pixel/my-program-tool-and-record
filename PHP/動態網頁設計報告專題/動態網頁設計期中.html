<!DOCTYPE html>
<html>
<head>
	<meta charset="utf-8">
	<meta name="viewport" content="width=device-width, initial-scale=1">
	<title>簡易網購系統</title>
</head>
<body>
	<center><h1>簡易網購系統</h1></center>
	<hr>
	<form action="webpage_midterm.php" method="GET">
		<div>訂購人: <input type="text" name="Orderer"></div>

		<div>商品選擇:
			<select name="product">
				<option value="0">請選擇商品</option>
				<option value="1000">MP5(1000元)</option>
				<option value="3000">UMP45(3000元)</option>
				<option value="5000">MP7(5000元)</option>
			</select>
		</div>

		<div>訂購數量: <input type="number" name="quantity" min = "1" value = "1"></div>

		<div>運送方式：
            <select name="transport">
                <option value="100">海運 ($100)</option>
                <option value="200">空運 ($200)</option>
            </select>
        </div>

		<div>訂單備註<textarea name="order_notes" cols="60" rows="6"></textarea></div>

		<div>
			是否加購禮盒包裝:
			<label><input type="radio" name="gift_box" value="1">是(+50元)</label>
			<label><input type="radio" name="gift_box" value="0">否</label>
		</div>

		<div>優惠加價購：
			<label><input type="checkbox" name="ADD[]" value="3000">4.6*30mm 300顆($3000)</label>
			<label><input type="checkbox" name="ADD[]" value="2000">9*19mm FMJ 300顆($2000)</label>
			<label><input type="checkbox" name="ADD[]" value="2000">9*19mm HP 300顆($2000)</label>
			<label><input type="checkbox" name="ADD[]" value="1500">.45 ACP 300顆($1500)</label>
			<label><input type="checkbox" name="ADD[]" value="200">壓克力槍盒($200)</label>
		</div>

		<button type="submit" name="submit">確認訂購</button>
		<button type="reset">清除並重填資料</button>
	</form>
</body>
</html>
